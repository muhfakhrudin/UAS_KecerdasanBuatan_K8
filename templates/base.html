<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SmartPick — Rekomendasi iPhone Bekas{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          accent: {
            DEFAULT: '#2563EB',
            dark: '#1D4ED8',
          },
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col">

<header class="border-b border-slate-200 bg-white">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="{% url 'index' %}" class="flex items-baseline gap-2">
      <span class="text-xl font-extrabold text-slate-900">SmartPick</span>
      <span class="hidden sm:inline text-xs text-slate-400">Rekomendasi iPhone Bekas Cerdas</span>
    </a>
    <a href="{% url 'restart' %}" class="text-sm text-slate-500 hover:text-accent transition">Mulai Ulang</a>
  </div>
</header>

<main class="flex-1">
  {% block content %}{% endblock %}
</main>

<footer class="border-t border-slate-200 bg-white">
  <div class="max-w-5xl mx-auto px-6 py-6 text-center text-xs text-slate-400">
    SmartPick &mdash; Sistem Rekomendasi iPhone Bekas berbasis AI (TF-IDF + BM25 + Value Score). Proyek UAS Kecerdasan Buatan.
  </div>
</footer>

</body>
</html>
