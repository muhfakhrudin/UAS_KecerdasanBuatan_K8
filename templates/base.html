<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}iRecom Master — Rekomendasi iPhone Bekas{% endblock %}</title>
<script>
  (function () {
    var stored = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          display: ['Lexend', 'sans-serif'],
        },
        colors: {
          accent: {
            50: '#f0fdfa',
            100: '#ccfbf1',
            400: '#2dd4bf',
            500: '#14b8a6',
            600: '#0d9488',
            700: '#0f766e',
            950: '#042f2c',
          },
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, .font-display { font-family: 'Lexend', sans-serif; }
</style>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-800 dark:bg-zinc-950 dark:text-zinc-200 flex flex-col transition-colors duration-200">

<header class="border-b border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-950/80 backdrop-blur sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="{% url 'index' %}" class="flex items-baseline gap-2">
      <span class="font-display text-xl font-bold text-zinc-900 dark:text-white">iRecom Master</span>
      <span class="hidden sm:inline text-xs text-zinc-400 dark:text-zinc-500">Rekomendasi iPhone Bekas Cerdas</span>
    </a>
    <div class="flex items-center gap-5">
      <a href="{% url 'restart' %}" class="text-sm text-zinc-500 dark:text-zinc-400 hover:text-accent-600 dark:hover:text-accent-400 transition-colors">Mulai Ulang</a>
      <button
        id="theme-toggle"
        type="button"
        aria-label="Ganti tampilan gelap/terang"
        class="w-9 h-9 flex items-center justify-center rounded-full border border-zinc-200 dark:border-zinc-700 text-zinc-500 dark:text-zinc-300 hover:border-accent-500 hover:text-accent-600 dark:hover:text-accent-400 transition-colors"
      >
        <svg class="w-4 h-4 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
        <svg class="w-4 h-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1.5m0 15V21m9-9h-1.5M4.5 12H3m15.36 6.36l-1.06-1.06M6.7 6.7L5.64 5.64m12.72 0l-1.06 1.06M6.7 17.3l-1.06 1.06M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="flex-1">
  {% block content %}{% endblock %}
</main>

<footer class="border-t border-zinc-200 dark:border-zinc-800">
  <div class="max-w-5xl mx-auto px-6 py-6 text-center text-xs text-zinc-400 dark:text-zinc-600">
    iRecom Master &mdash; Sistem Rekomendasi iPhone Bekas berbasis AI (TF-IDF + BM25 + Value Score). Proyek UAS Kecerdasan Buatan.
  </div>
</footer>

<script>
  document.getElementById('theme-toggle').addEventListener('click', function () {
    var root = document.documentElement;
    root.classList.toggle('dark');
    localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
  });
</script>

</body>
</html>
